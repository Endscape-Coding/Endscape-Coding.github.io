name: Update DistroWatch Stats

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests beautifulsoup4
      - run: python parcer.py
      - uses: actions/upload-artifact@v4
        with:
          name: dw-stats
          path: dw-stats.json
          retention-days: 7
